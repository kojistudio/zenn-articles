<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>回転行列の構造</title>
<desc>3本の軸方向の単位ベクトルを列として並べた3×3行列が回転行列（列ベクトル方式）</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- 左：3軸の座標系 -->
<circle cx="130" cy="210" r="4" style="fill:rgb(61,61,58);"/>
<line x1="130" y1="210" x2="220" y2="210" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>
<text x="226" y="206" style="fill:#D85A30;font-size:12px;">X軸</text>
<text x="226" y="220" style="fill:#D85A30;font-size:12px;">(Xx,Xy,Xz)</text>
<line x1="130" y1="210" x2="130" y2="120" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<text x="136" y="116" style="fill:#185FA5;font-size:12px;">Y軸 (Yx,Yy,Yz)</text>
<line x1="130" y1="210" x2="76" y2="256" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>
<text x="40" y="270" style="fill:#0F6E56;font-size:12px;">Z軸 (Zx,Zy,Zz)</text>
<text x="130" y="308" text-anchor="middle" style="fill:rgb(61,61,58);font-size:12px;">3本の軸 ＝ 3本の単位ベクトル</text>

<!-- まとめる矢印 -->
<line x1="262" y1="195" x2="298" y2="195" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="280" y="184" text-anchor="middle" style="fill:rgb(61,61,58);font-size:12px;">まとめる</text>

<!-- ブラケット -->
<path d="M318 105 L308 105 L308 290 L318 290" fill="none" stroke="rgb(61,61,58)" stroke-width="2" stroke-linecap="round"/>
<path d="M632 105 L642 105 L642 290 L632 290" fill="none" stroke="rgb(61,61,58)" stroke-width="2" stroke-linecap="round"/>

<!-- 列1：X軸方向（coral） -->
<rect x="323" y="110" width="96" height="56" rx="4" style="fill:rgb(250,236,231);stroke:rgb(153,60,29);stroke-width:0.5;"/>
<rect x="323" y="172" width="96" height="56" rx="4" style="fill:rgb(250,236,231);stroke:rgb(153,60,29);stroke-width:0.5;"/>
<rect x="323" y="234" width="96" height="56" rx="4" style="fill:rgb(250,236,231);stroke:rgb(153,60,29);stroke-width:0.5;"/>
<text x="371" y="138" text-anchor="middle" dominant-baseline="central" style="fill:rgb(153,60,29);font-size:13px;font-weight:600;">Xx</text>
<text x="371" y="200" text-anchor="middle" dominant-baseline="central" style="fill:rgb(153,60,29);font-size:13px;font-weight:600;">Xy</text>
<text x="371" y="262" text-anchor="middle" dominant-baseline="central" style="fill:rgb(153,60,29);font-size:13px;font-weight:600;">Xz</text>
<text x="371" y="302" text-anchor="middle" dominant-baseline="central" style="fill:rgb(153,60,29);font-size:11px;font-weight:500;">X軸方向</text>

<!-- 列2：Y軸方向（blue） -->
<rect x="427" y="110" width="96" height="56" rx="4" style="fill:rgb(230,241,251);stroke:rgb(24,95,165);stroke-width:0.5;"/>
<rect x="427" y="172" width="96" height="56" rx="4" style="fill:rgb(230,241,251);stroke:rgb(24,95,165);stroke-width:0.5;"/>
<rect x="427" y="234" width="96" height="56" rx="4" style="fill:rgb(230,241,251);stroke:rgb(24,95,165);stroke-width:0.5;"/>
<text x="475" y="138" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24,95,165);font-size:13px;font-weight:600;">Yx</text>
<text x="475" y="200" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24,95,165);font-size:13px;font-weight:600;">Yy</text>
<text x="475" y="262" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24,95,165);font-size:13px;font-weight:600;">Yz</text>
<text x="475" y="302" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24,95,165);font-size:11px;font-weight:500;">Y軸方向</text>

<!-- 列3：Z軸方向（teal） -->
<rect x="531" y="110" width="96" height="56" rx="4" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);stroke-width:0.5;"/>
<rect x="531" y="172" width="96" height="56" rx="4" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);stroke-width:0.5;"/>
<rect x="531" y="234" width="96" height="56" rx="4" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);stroke-width:0.5;"/>
<text x="579" y="138" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-size:13px;font-weight:600;">Zx</text>
<text x="579" y="200" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-size:13px;font-weight:600;">Zy</text>
<text x="579" y="262" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-size:13px;font-weight:600;">Zz</text>
<text x="579" y="302" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-size:11px;font-weight:500;">Z軸方向</text>

<!-- 説明テキスト -->
<text x="475" y="330" text-anchor="middle" style="fill:rgb(61,61,58);font-size:12px;">各列 ＝ 各軸の方向余弦（3成分）　だから「方向余弦行列」とも呼ばれる</text>

<!-- タイトル -->
<text x="340" y="46" text-anchor="middle" style="fill:rgb(20,20,19);font-size:14px;font-weight:500;">回転行列 ＝ 3軸の方向余弦をひとまとめにした3×3行列（列ベクトル方式）</text>
</svg>
